<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Maze Search Visualiser</title>
    <link rel="stylesheet" href="../../../style.css" />
    <style>
        .container {
            align-items: flex-start;
            gap: 20px;
        }

        #grid-wrapper {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        #mazeCanvas {
            background: white;
            border: 3px solid #a78bfa;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            display: block;
            cursor: default;
            image-rendering: pixelated;
        }

        .legend {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.9);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            color: #374151;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        .legend-dot {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            flex-shrink: 0;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 8px;
            border: 2px solid #e5e7eb;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }

        .radio-option:hover {
            border-color: #a78bfa;
            background: #faf5ff;
        }

        .radio-option input[type="radio"] {
            accent-color: #8b5cf6;
            width: 16px;
            height: 16px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .radio-option.selected {
            border-color: #8b5cf6;
            background: #ede9fe;
        }

        .radio-label {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .radio-label strong {
            font-size: 13px;
            color: #374151;
        }

        .radio-label span {
            font-size: 11px;
            color: #9ca3af;
        }

        #stepControls {
            display: none;
            gap: 8px;
            margin-top: 8px;
        }

        #stepControls button {
            flex: 1;
            padding: 8px 6px;
            font-size: 12px;
        }

        #stepPill {
            display: none;
            background: #6b21a8;
            color: white;
            font-size: 12px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
            text-align: center;
            margin-top: 8px;
        }

        /* Two-column dimension inputs */
        .dim-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 10px;
        }

        .dim-row label {
            font-size: 12px;
            margin: 0;
            color: #4b5563;
            min-width: 36px;
        }

        .dim-row input[type="number"] {
            width: 68px;
            flex-shrink: 0;
        }
    </style>
</head>

<body>
    <h2>Maze Search Visualiser</h2>

    <div class="container">

        <!-- ── Left controls panel ── -->
        <div class="controls">

            <div class="control-group">
                <h3>Maze</h3>
                <div class="dim-row">
                    <label>Rows:</label>
                    <input type="number" id="gridRows" value="51" min="5" max="201" step="2">
                </div>
                <div class="dim-row">
                    <label>Cols:</label>
                    <input type="number" id="gridCols" value="151" min="5" max="401" step="2">
                </div>
                <button id="generateBtn">Generate Maze</button>
                <button id="clearBtn" style="background:#6366f1; margin-top:4px;">Clear Grid</button>
            </div>

            <div class="control-group">
                <h3>Search Algorithm</h3>
                <div class="radio-group">
                    <label class="radio-option selected" id="label-dfs">
                        <input type="radio" name="algorithm" value="dfs" checked>
                        <div class="radio-label">
                            <strong>Depth-First Search</strong>
                            <span>Explores deep before backtracking</span>
                        </div>
                    </label>
                    <label class="radio-option" id="label-bfs">
                        <input type="radio" name="algorithm" value="bfs">
                        <div class="radio-label">
                            <strong>Breadth-First Search</strong>
                            <span>Guarantees shortest path</span>
                        </div>
                    </label>
                </div>
                <button id="solveBtn" style="background:#3b82f6; margin-top: 12px;">Solve Maze</button>
            </div>

            <div class="control-group">
                <h3>Visualisation</h3>
                <label style="display:flex; align-items:center; gap:8px; margin-bottom:0;">
                    <input type="checkbox" id="visualiseCheck">
                    Step-by-step mode
                </label>
                <div id="stepControls">
                    <button id="stepBackBtn">← Back</button>
                    <button id="stepForwardBtn">Forward →</button>
                </div>
                <div id="stepPill">Step 0 / 0</div>
            </div>

        </div>

        <!-- ── Centre: grid canvas ── -->
        <div id="grid-wrapper">
            <canvas id="mazeCanvas"></canvas>

            <div class="legend">
                <div class="legend-item">
                    <div class="legend-dot" style="background:#1f2937;"></div>Wall
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background:#ffffff; border:1px solid #d1d5db;"></div>Path
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background:#22c55e;"></div>Start
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background:#ef4444;"></div>End
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background:#93c5fd;"></div>Visited
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background:#f59e0b;"></div>Solution
                </div>
            </div>
        </div>

    </div>

    <!-- Solvers must load before Mazes.js uses them -->
    <script src="BFS.js"></script>
    <script src="DFS.js"></script>
    <script src="Mazes.js"></script>
</body>

</html>
