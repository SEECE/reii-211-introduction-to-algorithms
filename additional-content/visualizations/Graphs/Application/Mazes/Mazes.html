<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="stylesheet" href="Mazes.css" />
</head>

<body>

    <script src="modules/UIControls.js"></script>
    <script src="modules/MazeGenerator.js"></script>
    <script src="modules/CanvasRenderer.js"></script>
    <script src="modules/VisualizationController.js"></script>
    <script src="Mazes.js"></script>
</body>

</html>
